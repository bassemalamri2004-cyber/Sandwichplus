<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>مدير مهام باسم</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        input[type="text"] {
            width: 70%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 15px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: baseline;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>قائمة مهام باسم 🚀</h2>


        <form method="POST" action="">
            {% csrf_token %}
            <input type="text" name="title" placeholder="وش تبي تسوي اليوم؟" required>
            <button type="submit">إضافة</button>
        </form>

        <hr>

        {% for task in tasks %}
        <div class="task-item">
            <input type="checkbox" {% if task.complete %} checked {% endif %}>
            <span style="margin-right: 10px;">{{ task.title }}</span>
        </div>
        {% endfor %}


    </div>

</body>

</html>
